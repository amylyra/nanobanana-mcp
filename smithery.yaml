startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      geminiApiKey:
        type: string
        description: "Google AI API key with Gemini image generation access"
      gcsBucket:
        type: string
        description: "Optional GCS bucket name for URL output instead of base64"
    required:
      - geminiApiKey
  commandFunction: |-
    (config) => ({
      command: 'python',
      args: ['server.py'],
      env: {
        GEMINI_API_KEY: config.geminiApiKey,
        MCP_TRANSPORT: 'stdio',
        ...(config.gcsBucket ? { GCS_BUCKET: config.gcsBucket } : {})
      }
    })
